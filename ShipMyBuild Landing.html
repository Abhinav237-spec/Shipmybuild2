<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ShipMyBuild — your AI co-founder council</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #FAF9F5;
  --ink: #0E0D0B;
  --ink-2: #2B2924;
  --ink-3: #6B6862;
  --ink-4: #B5B1A6;
  --rule: #E6E3D9;
  --rule-2: #D6D2C4;
  --accent: oklch(0.66 0.19 32);
  --accent-ink: oklch(0.42 0.15 32);
  --accent-tint: oklch(0.96 0.04 60);
  --green: oklch(0.72 0.16 145);
  --blue: oklch(0.62 0.17 250);
  --violet: oklch(0.6 0.18 300);
  --yellow: oklch(0.85 0.16 90);
  --pad-x: clamp(20px, 4vw, 56px);
  --gap: 22px;
}
[data-density="compact"] { --gap: 14px; }
[data-density="spacious"] { --gap: 32px; }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
body {
  font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
  font-feature-settings: "ss01", "ss02", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
::selection { background: var(--ink); color: var(--paper); }
.mono { font-family: "Geist Mono", ui-monospace, monospace; }
.serif { font-family: "Instrument Serif", "Times New Roman", serif; font-style: italic; font-weight: 400; }

/* ── Top nav ───────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px var(--pad-x);
  background: color-mix(in oklab, var(--paper) 88%, transparent);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.nav.scrolled { border-bottom-color: var(--rule); }
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 17px; letter-spacing: -0.01em;
}
.brand-mark {
  width: 26px; height: 26px; border-radius: 7px; background: var(--ink);
  color: var(--paper);
  display: grid; place-items: center; font-family: "Geist Mono"; font-weight: 700; font-size: 14px;
  position: relative; overflow: hidden;
}
.brand-mark::after{
  content:""; position:absolute; inset:0; background: var(--accent);
  clip-path: polygon(0 60%, 100% 30%, 100% 100%, 0 100%);
  opacity: .9;
}
.brand-mark span { position: relative; z-index: 1; }
.nav-links { display: flex; gap: 28px; font-size: 13.5px; color: var(--ink-2); }
.nav-links a { color: inherit; text-decoration: none; transition: color .15s; }
.nav-links a:hover { color: var(--ink); }
.nav-cta { display: flex; align-items: center; gap: 10px; }
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  background: var(--paper); border: 1px solid var(--rule);
  font-size: 11.5px; font-family: "Geist Mono"; color: var(--ink-2);
}
.pill .dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--green) 30%, transparent);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px color-mix(in oklab, var(--green) 30%, transparent); }
  50% { box-shadow: 0 0 0 6px color-mix(in oklab, var(--green) 0%, transparent); }
}

/* Buttons */
.btn {
  appearance: none; border: 0; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 11px 18px; border-radius: 10px;
  display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
  transition: transform .15s, background .15s, color .15s, box-shadow .15s;
}
.btn-primary {
  background: var(--ink); color: var(--paper);
  box-shadow: 0 1px 0 rgba(255,255,255,.15) inset, 0 6px 18px -6px rgba(14,13,11,.5);
}
.btn-primary:hover { transform: translateY(-1px); background: #1a1814; }
.btn-ghost { background: transparent; color: var(--ink-2); }
.btn-ghost:hover { color: var(--ink); }
.btn-arrow { width: 14px; height: 14px; transition: transform .2s; }
.btn:hover .btn-arrow { transform: translate(2px, -2px); }

/* ── Hero scaffold ─────────────────────────────────────────── */
.hero {
  position: relative;
  padding: clamp(36px, 6vw, 80px) var(--pad-x) clamp(40px, 6vw, 90px);
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
  gap: clamp(32px, 5vw, 80px);
  align-items: center;
  max-width: 1380px; margin: 0 auto;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: "Geist Mono"; font-size: 11.5px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 22px;
}
.eyebrow::before {
  content: ""; width: 24px; height: 1px; background: var(--ink-3);
}
.h1 {
  font-size: clamp(44px, 7vw, 96px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  font-weight: 600;
  margin: 0 0 26px;
  text-wrap: balance;
}
.h1 .strike { position: relative; white-space: nowrap; }
.h1 .strike::after {
  content: ""; position: absolute; left: -2%; right: -2%; top: 56%;
  height: 6px; background: var(--accent); transform: rotate(-1.5deg);
  border-radius: 2px;
}
.h1 em { font-family: "Instrument Serif"; font-style: italic; font-weight: 400; letter-spacing: -0.01em; }
.lede {
  font-size: clamp(16px, 1.5vw, 19px);
  line-height: 1.5; color: var(--ink-2);
  max-width: 50ch; margin: 0 0 32px;
}
.lede b { font-weight: 600; color: var(--ink); }
.cta-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.cta-meta { font-size: 12.5px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
.cta-meta .check {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--ink); color: var(--paper);
  display: grid; place-items: center; font-size: 9px;
}

/* ── Hero stage (right column) ─────────────────────────────── */
.stage {
  position: relative;
  aspect-ratio: 1 / 1;
  width: 100%;
  max-width: 620px;
  margin-left: auto;
}

/* shared agent card style */
.agent {
  position: absolute;
  width: 200px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 22px 14px 13px;
  box-shadow: 0 1px 0 rgba(255,255,255,.8) inset, 0 12px 24px -16px rgba(14,13,11,.25);
  transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .25s;
}
.agent:hover { transform: translate(var(--tx,0), var(--ty,0)) scale(1.04); z-index: 5; box-shadow: 0 1px 0 rgba(255,255,255,.8) inset, 0 16px 36px -14px rgba(14,13,11,.32); }
.agent.thinking { animation: float 5s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translate(var(--tx,0), var(--ty,0)); }
  50% { transform: translate(var(--tx,0), calc(var(--ty,0) - 6px)); }
}
.agent-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.agent-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
  font-family: "Geist Mono"; font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.agent-meta { min-width: 0; }
.agent-name { font-size: 13px; font-weight: 600; line-height: 1.1; letter-spacing: -0.01em; }
.agent-role { font-size: 10.5px; font-family: "Geist Mono"; color: var(--ink-3); margin-top: 2px; line-height: 1; }
.agent-quote {
  font-size: 12px; line-height: 1.4; color: var(--ink-2);
  border-top: 1px dashed var(--rule);
  padding-top: 9px;
  min-height: 50px;
}
.agent-quote::before { content: "\201C"; font-family: "Instrument Serif"; font-size: 18px; line-height: 0; vertical-align: -4px; color: var(--ink-3); margin-right: 2px; }
.agent-vote {
  position: absolute; top: -11px; right: 12px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 999px; padding: 3px 9px;
  font-family: "Geist Mono"; font-size: 10px; font-weight: 600;
  color: var(--ink-2);
  z-index: 2;
  box-shadow: 0 4px 10px -4px rgba(14,13,11,.18);
  line-height: 1.4;
}
.agent-vote.yes { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.agent-vote.no { background: var(--paper); color: var(--accent-ink); border-color: var(--accent); }

/* center idea card */
.idea {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 56%; max-width: 280px;
  background: var(--ink); color: var(--paper);
  border-radius: 14px;
  padding: 16px 16px 14px;
  box-shadow: 0 24px 60px -24px rgba(14,13,11,.55);
  z-index: 3;
}
.idea-label {
  font-family: "Geist Mono"; font-size: 10.5px; letter-spacing: 0.08em;
  color: var(--ink-4); text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.idea-label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.idea-text {
  font-size: 16px; line-height: 1.3; letter-spacing: -0.01em; font-weight: 500;
}
.idea-text .cursor {
  display: inline-block; width: 2px; height: 1em; vertical-align: -3px;
  background: var(--accent); margin-left: 2px;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.idea-tally {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
  padding-top: 12px; border-top: 1px dashed rgba(255,255,255,.16);
  font-family: "Geist Mono"; font-size: 10.5px; color: var(--ink-4);
}
.idea-tally b { color: var(--paper); font-weight: 600; }

/* connecting lines (svg) */
.stage-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
.stage-svg path { stroke: var(--ink-4); stroke-dasharray: 3 4; fill: none; opacity: 0.6; }
.stage-svg .pulse {
  stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round;
  stroke-dasharray: 6 200; stroke-dashoffset: 0;
  animation: travel 3s linear infinite;
}
@keyframes travel { to { stroke-dashoffset: -206; } }

/* corner artifacts */
.corner {
  position: absolute; font-family: "Geist Mono"; font-size: 10.5px;
  color: var(--ink-3); display: flex; align-items: center; gap: 6px;
  z-index: 2;
}
.corner .sq { width: 6px; height: 6px; background: var(--accent); }

/* ── Variant: Conveyor ─────────────────────────────────────── */
.conveyor { position: relative; width: 100%; height: 100%; }
.conveyor-track {
  position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
  height: 90px;
  background:
    repeating-linear-gradient(90deg, var(--rule) 0 8px, transparent 8px 16px),
    var(--paper);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  overflow: hidden;
}
.conveyor-track::before {
  content: ""; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 14px, color-mix(in oklab, var(--rule) 60%, transparent) 14px 16px);
  animation: slide 2s linear infinite;
}
@keyframes slide { to { transform: translateX(20px); } }
.conveyor-stations {
  position: relative; z-index: 2; display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; padding: 0 10px; align-items: center; height: 100%;
}
.station { position: relative; }
.station .agent { position: relative; width: 100%; max-width: 168px; margin: 0 auto; }
.station::after {
  content: ""; position: absolute; left: 50%; top: 56%; transform: translateX(-50%);
  width: 1px; height: 22px; background: var(--ink-4);
}
.conveyor-tag {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-family: "Geist Mono"; font-size: 9.5px; color: var(--ink-3);
  background: var(--paper); padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--rule); white-space: nowrap;
}
.conveyor-input, .conveyor-output {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: var(--ink); color: var(--paper);
  padding: 14px 16px; border-radius: 12px;
  font-family: "Geist Mono"; font-size: 11px;
  z-index: 3; min-width: 110px;
}
.conveyor-input { left: -10px; }
.conveyor-output { right: -10px; background: var(--accent); }
.conveyor-input small, .conveyor-output small {
  display: block; font-size: 9px; opacity: .6; letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 4px;
}

/* ── Variant: Roundtable ──────────────────────────────────── */
.roundtable { position: relative; width: 100%; height: 100%; }
.table-ring {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 78%; height: 78%; border-radius: 50%;
  border: 1px dashed var(--rule-2);
}
.table-ring::before {
  content: ""; position: absolute; inset: 14%; border-radius: 50%;
  border: 1px solid var(--rule);
  background: radial-gradient(circle, var(--accent-tint) 0%, transparent 70%);
}

/* ── How it works ─────────────────────────────────────────── */
.how {
  padding: clamp(60px, 8vw, 120px) var(--pad-x);
  border-top: 1px solid var(--rule);
  background: var(--paper);
}
.how-inner { max-width: 1380px; margin: 0 auto; }
.section-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 40px; margin-bottom: clamp(40px, 5vw, 70px);
  border-bottom: 1px solid var(--rule); padding-bottom: 28px;
}
.section-h {
  font-size: clamp(34px, 4vw, 56px);
  line-height: 1; letter-spacing: -0.03em; font-weight: 600; margin: 0;
  max-width: 18ch;
}
.section-h em { font-family: "Instrument Serif"; font-style: italic; font-weight: 400; }
.section-meta {
  font-family: "Geist Mono"; font-size: 11.5px; color: var(--ink-3);
  flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex !important; flex-direction: column !important; gap: 6px; align-items: flex-end;
  line-height: 1.2;
}
.section-meta > * { display: block !important; width: 100%; text-align: right; white-space: nowrap; }
.section-meta b { color: var(--ink); font-weight: 600; font-size: 13px; }
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
@media (max-width: 900px) { .steps { grid-template-columns: 1fr; } }
.step {
  padding: 32px 32px 36px;
  border-right: 1px solid var(--rule);
  position: relative;
  display: flex; flex-direction: column; gap: 18px;
}
.step:last-child { border-right: 0; }
@media (max-width: 900px) { .step { border-right: 0; border-bottom: 1px solid var(--rule); } .step:last-child { border-bottom: 0; } }
.step-num {
  font-family: "Geist Mono"; font-size: 11px; color: var(--ink-3);
  display: flex; justify-content: space-between; align-items: center;
}
.step-num b { color: var(--ink); font-weight: 600; font-size: 13px; }
.step-art {
  height: 200px;
  border: 1px solid var(--rule); border-radius: 12px;
  background: linear-gradient(180deg, color-mix(in oklab, var(--paper) 50%, white) 0%, var(--paper) 100%);
  overflow: hidden; position: relative;
}
.step-h {
  font-size: 24px; line-height: 1.1; letter-spacing: -0.02em;
  font-weight: 600; margin: 0;
}
.step-p {
  font-size: 14px; line-height: 1.5; color: var(--ink-2); margin: 0;
  max-width: 36ch;
}

/* step 1 art — typing input */
.art-input {
  position: absolute; left: 18px; right: 18px; top: 50%;
  transform: translateY(-50%);
  background: var(--paper); border: 1px solid var(--rule); border-radius: 10px;
  padding: 10px 12px; box-shadow: 0 8px 20px -12px rgba(14,13,11,.2);
}
.art-input .lbl {
  font-family: "Geist Mono"; font-size: 9.5px; letter-spacing: .08em;
  color: var(--ink-3); text-transform: uppercase; margin-bottom: 5px;
}
.art-input .val { font-size: 13px; color: var(--ink); font-weight: 500; }
.art-input .val .cursor { background: var(--accent); }
.art-keys {
  position: absolute; bottom: 14px; left: 18px; right: 18px;
  display: flex; gap: 5px; flex-wrap: wrap;
}
.art-keys span {
  font-family: "Geist Mono"; font-size: 9.5px; padding: 3px 7px;
  background: var(--paper); border: 1px solid var(--rule); border-radius: 5px;
  color: var(--ink-3);
}

/* step 2 art — debate */
.art-debate { position: absolute; inset: 16px; display: flex; flex-direction: column; gap: 6px; }
.bubble {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 11.5px;
}
.bubble .av {
  width: 18px; height: 18px; border-radius: 5px;
  display: grid; place-items: center;
  font-family: "Geist Mono"; font-weight: 700; font-size: 9px;
  flex-shrink: 0; color: var(--paper);
}
.bubble p {
  margin: 0; padding: 5px 9px;
  background: var(--paper); border: 1px solid var(--rule); border-radius: 8px;
  color: var(--ink-2); line-height: 1.3;
}
.bubble .name { font-weight: 600; color: var(--ink); margin-right: 4px; }

/* step 3 art — verdict */
.art-verdict {
  position: absolute; inset: 0; display: grid; place-items: center;
}
.verdict-card {
  width: 88%; background: var(--ink); color: var(--paper);
  border-radius: 12px; padding: 14px;
  box-shadow: 0 16px 40px -16px rgba(14,13,11,.5);
}
.verdict-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.verdict-name { white-space: nowrap; }
.verdict-row + .verdict-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,.15); }
.verdict-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.verdict-vote {
  font-family: "Geist Mono"; font-size: 10px; padding: 2px 8px;
  border-radius: 999px; border: 1px solid rgba(255,255,255,.2);
  white-space: nowrap; flex-shrink: 0;
}
.verdict-vote.yes { background: var(--accent); border-color: var(--accent); color: var(--paper); }
.verdict-tally {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.15);
  display: flex; justify-content: space-between; align-items: center;
  font-family: "Geist Mono"; font-size: 10.5px; color: var(--ink-4);
}
.verdict-tally b { color: var(--paper); }

/* ── Pre-registration section ─────────────────────────────── */
.prereg {
  padding: clamp(48px, 6vw, 80px) var(--pad-x);
  border-top: 1px solid var(--rule);
  background: var(--paper);
}
.prereg-inner {
  max-width: 1380px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: clamp(32px, 5vw, 80px);
  flex-wrap: wrap;
}
.prereg-copy { flex: 1 1 300px; max-width: 480px; }
.prereg-label {
  font-family: "Geist Mono"; font-size: 11px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.prereg-label::before { content: ""; width: 20px; height: 1px; background: var(--ink-3); }
.prereg-h {
  font-size: clamp(26px, 3vw, 38px); line-height: 1.1;
  letter-spacing: -0.025em; font-weight: 600; margin: 0 0 12px;
}
.prereg-h em { font-family: "Instrument Serif"; font-style: italic; font-weight: 400; }
.prereg-sub {
  font-size: 14px; line-height: 1.6; color: var(--ink-2); margin: 0;
}
.prereg-form-wrap { flex: 1 1 320px; max-width: 440px; }
.prereg-box {
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 14px; padding: 24px;
  box-shadow: 0 1px 0 rgba(255,255,255,.8) inset, 0 8px 24px -16px rgba(14,13,11,.12);
}
.prereg-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.prereg-field {
  display: flex; flex-direction: column; gap: 5px;
}
.prereg-field label {
  font-family: "Geist Mono"; font-size: 10.5px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.prereg-field input {
  appearance: none; border: 1px solid var(--rule);
  border-radius: 8px; background: color-mix(in oklab, var(--paper) 60%, white);
  font-family: inherit; font-size: 14px; color: var(--ink);
  padding: 10px 12px; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.prereg-field input:focus {
  border-color: var(--ink-3);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--ink) 8%, transparent);
}
.prereg-field input::placeholder { color: var(--ink-4); }
.prereg-submit {
  appearance: none; border: 0; cursor: pointer; width: 100%;
  font-family: inherit; font-size: 13.5px; font-weight: 500;
  padding: 11px 18px; border-radius: 9px;
  background: var(--ink); color: var(--paper);

// ─── TweaksPanel (inline) ───────────────────────────────────
const __TWEAKS_STYLE = `

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value); valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </div>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor });

function useTypewriter(phrases, speed = 38, hold = 1600) {
  const [text, setText] = React.useState('');
  const idx = React.useRef(0);
  const pos = React.useRef(0);
  const dir = React.useRef(1);
  React.useEffect(() => {
    let t;
    const tick = () => {
      const phrase = phrases[idx.current];
      pos.current += dir.current;
      setText(phrase.slice(0, pos.current));
      if (dir.current === 1 && pos.current >= phrase.length) {
        dir.current = 0; t = setTimeout(() => { dir.current = -1; tick(); }, hold); return;
      }
      if (dir.current === -1 && pos.current <= 0) {
        dir.current = 1; idx.current = (idx.current + 1) % phrases.length;
      }
      t = setTimeout(tick, dir.current === -1 ? speed * 0.5 : speed);
    };
    t = setTimeout(tick, 600);
    return () => clearTimeout(t);
  }, []);
  return text;
}

<script type="text/babel" data-presets="react">

// ─── PreRegistration section ────────────────────────────────
function PreRegistration() {
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [phone, setPhone] = React.useState('');
  const [status, setStatus] = React.useState('idle'); // idle | loading | success | error
  const [errMsg, setErrMsg] = React.useState('');

  const handleSubmit = async () => {
    if (!name.trim() || !email.trim() || !phone.trim()) {
      setErrMsg('Please fill in all three fields.'); return;
    }
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
    if (!emailOk) { setErrMsg('Enter a valid email address.'); return; }
    setErrMsg('');
    setStatus('loading');
    try {
      await insertPreregistration({ name: name.trim(), email: email.trim(), phone: phone.trim() });
      setStatus('success');
    } catch (e) {
      setErrMsg(e.message || 'Something went wrong. Try again.');
      setStatus('error');
    }
  };

  return (
    <section className="prereg" id="preregister">
      <div className="prereg-inner">
        <div className="prereg-copy">
          <div className="prereg-label">Early access</div>
          <h2 className="prereg-h">Get in before we<br/><em>open the doors</em>.</h2>
          <p className="prereg-sub">
            We're onboarding the first batch of founders manually. Leave your details and we'll reach out when your spot is ready — no noise, just a ping.
          </p>
        </div>
        <div className="prereg-form-wrap">
          <div className="prereg-box">
            {status === 'success' ? (
              <div className="prereg-success">
                <div className="prereg-success-icon">✓</div>
                <h4>You're on the list.</h4>
                <p>We'll reach out on WhatsApp or email<br/>when your spot opens up.</p>
              </div>
            ) : (
              <>
                <div className="prereg-fields">
                  <div className="prereg-field">
                    <label>Full name</label>
                    <input
                      type="text" placeholder="Rahul Mehta"
                      value={name} onChange={(e) => setName(e.target.value)}
                      disabled={status === 'loading'}
                    />
                  </div>
                  <div className="prereg-field">
                    <label>Email</label>
                    <input
                      type="email" placeholder="rahul@startup.in"
                      value={email} onChange={(e) => setEmail(e.target.value)}
                      disabled={status === 'loading'}
                    />
                  </div>
                  <div className="prereg-field">
                    <label>Phone / WhatsApp</label>
                    <input
                      type="tel" placeholder="+91 98765 43210"
                      value={phone} onChange={(e) => setPhone(e.target.value)}
                      disabled={status === 'loading'}
                    />
                  </div>
                </div>
                {errMsg && <div className="prereg-err">{errMsg}</div>}
                <button
                  className="prereg-submit"
                  onClick={handleSubmit}
                  disabled={status === 'loading'}
                >
                  {status === 'loading' ? 'Saving…' : 'Request early access'}
                </button>
                <div className="prereg-note">No spam. We'll only write when it matters.</div>
              </>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}
Object.assign(window, { PreRegistration });
</script>
